[versions]
kotlin = "2.4.0"
android = "9.2.1"
android-tools = "32.2.1"
ksp = "2.3.6"
navigation = "2.9.8"
libsu = "6.0.0"
okhttp = "5.3.2"
retrofit = "3.0.0"
room = "2.8.4"
coil-compose = "2.7.0"
lifecycle = "2.10.0"
compose-ui = "1.11.2"
compose-m3 = "1.5.0-alpha21"
navigation3 = "1.1.2"
navigationevent = "1.1.1"
wire = "6.4.0"
bouncycastle = "1.84"
